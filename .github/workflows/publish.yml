name: Publish VSIX

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Visual Studio Marketplace after verification"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and package
        run: npm run verify

      - name: Inspect package contents
        run: node node_modules/@vscode/vsce/vsce ls --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: txtjet-syntax-vsix
          path: "*.vsix"

      - name: Publish to Marketplace
        if: ${{ inputs.publish == true }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is required when publish=true."
            exit 1
          fi
          npx --no-install vsce publish --packagePath txtjet-syntax-*.vsix
